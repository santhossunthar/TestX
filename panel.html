<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestX</title>
    <link rel="stylesheet" href="./src/devtools/panel.css" />
  </head>
  <body>
    <header class="toolbar">
      <strong>TestX</strong>
      <label>
        Type
        <select id="typeFilter">
          <option value="all">All</option>
          <option value="network">Network</option>
          <option value="console">Console</option>
          <option value="storage">Storage</option>
        </select>
      </label>
      <input id="searchInput" type="search" placeholder="Search URL, args, keys..." />
      <button id="themeToggle" type="button" aria-label="Switch to dark mode" title="Switch to dark mode">
        <span id="themeIcon" aria-hidden="true">💡</span>
      </button>
      <button id="snapshotBtn">Refresh Storage</button>
      <button id="exportBtn">Export JSON</button>
    </header>
    <main>
      <div id="count"></div>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Type</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </main>
    <script type="module" src="./src/devtools/panel.ts"></script>
  </body>
</html>
